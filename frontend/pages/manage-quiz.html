<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Quizzes - AssessAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-gradient-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="admin-dashboard.html">AssessAI - Admin</a>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Manage Quizzes</h2>
                <a href="admin-dashboard.html" class="btn btn-outline-secondary">Back</a>
            </div>

            <div id="quizzesList" class="row g-3">
                <div class="col-12 text-center py-4">
                    <div class="spinner-border"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'admin-login.html';
                return;
            }

            loadQuizzes();
        });

        function loadQuizzes() {
            const quizzes = getQuizzes();
            const container = document.getElementById('quizzesList');
            
            if (quizzes.length === 0) {
                container.innerHTML = '<p class="text-muted">No quizzes found</p>';
                return;
            }

            let html = '';
            quizzes.forEach(quiz => {
                const questionCount = getQuestionsByQuizId(quiz.id).length;
                html += `
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-1">${quiz.title}</h5>
                                    <p class="text-muted mb-0">${quiz.category} • ${quiz.duration} min • ${questionCount} questions</p>
                                </div>
                                <div>
                                    <a href="add-question.html?quizId=${quiz.id}" class="btn btn-sm btn-outline-primary">Questions</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            setCurrentUser(null);
            window.location.href = 'admin-login.html';
        });
    </script>
</body>
</html>
