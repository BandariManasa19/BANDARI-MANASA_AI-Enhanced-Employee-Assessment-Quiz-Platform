<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Insights - AssessAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-gradient-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="employee-dashboard.html">AssessAI</a>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>ML & AI Insights 🧠</h2>
                <a href="employee-dashboard.html" class="btn btn-outline-secondary">Back</a>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5>Model Architecture</h5>
                            <ul class="list-unstyled">
                                <li><strong>Algorithm:</strong> Random Forest Classifier</li>
                                <li><strong>Features:</strong> 5 input features</li>
                                <li><strong>Classes:</strong> 3 performance categories</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5>Feature Importance</h5>
                            <div class="mb-2">
                                <small>Score (30%)</small>
                                <div class="progress">
                                    <div class="progress-bar" style="width: 30%"></div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <small>Accuracy (25%)</small>
                                <div class="progress">
                                    <div class="progress-bar" style="width: 25%"></div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <small>Time Taken (15%)</small>
                                <div class="progress">
                                    <div class="progress-bar" style="width: 15%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            setCurrentUser(null);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
