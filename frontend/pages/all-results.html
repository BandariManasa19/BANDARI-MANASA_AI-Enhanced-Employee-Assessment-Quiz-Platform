<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Results - AssessAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-gradient-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="employee-dashboard.html">AssessAI</a>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>My Assessment History</h2>
                <a href="employee-dashboard.html" class="btn btn-outline-secondary">Back</a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div id="resultsTable">
                        <div class="text-center py-4">
                            <div class="spinner-border"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            loadResults(user.id);
        });

        function loadResults(userId) {
            const attempts = getAttemptsByEmployee(userId);
            const container = document.getElementById('resultsTable');
            
            if (attempts.length === 0) {
                container.innerHTML = '<p class="text-muted">No results found</p>';
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Quiz</th>
                                <th>Score</th>
                                <th>Accuracy</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            attempts.slice().reverse().forEach(attempt => {
                const quiz = findQuizById(attempt.quizId);
                html += `
                    <tr>
                        <td>${quiz?.title || 'Unknown'}</td>
                        <td>${attempt.score}/${attempt.totalQuestions}</td>
                        <td>${attempt.accuracy}%</td>
                        <td>${new Date(attempt.endTime).toLocaleDateString()}</td>
                        <td>
                            <a href="result.html?attemptId=${attempt.id}" class="btn btn-sm btn-primary">View</a>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            setCurrentUser(null);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
