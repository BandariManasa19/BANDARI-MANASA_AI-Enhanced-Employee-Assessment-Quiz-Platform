<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - AssessAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-gradient-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="employee-dashboard.html">AssessAI - Quiz</a>
            <div class="timer-display">
                <span class="badge bg-light text-dark fs-5" id="timer">30:00</span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container py-4">
            <div class="card mb-4">
                <div class="card-body">
                    <h3 id="quizTitle">Loading Quiz...</h3>
                    <p class="text-muted" id="quizCategory"></p>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-3">
                        <span>Progress: <span id="progressText">0/0</span></span>
                        <div class="progress" style="width: 200px;">
                            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="quizContent" class="card mb-4">
                <div class="card-body text-center py-5">
                    <div class="spinner-border"></div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <button class="btn btn-outline-secondary" id="prevBtn" disabled>Previous</button>
                <button class="btn btn-primary" id="nextBtn">Next</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/ml.js"></script>
    <script src="../js/feedback.js"></script>
    <script>
        let currentQuestion = 0;
        let answers = {};
        let timeLeft = 0;
        let timerInterval;
        let quizId = '';

        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            quizId = params.get('quizId');
            
            if (!quizId) {
                window.location.href = 'employee-dashboard.html';
                return;
            }

            loadQuiz(quizId);
        });

        function loadQuiz(id) {
            const quiz = findQuizById(id);
            const questions = getQuestionsByQuizId(id);
            
            if (!quiz || questions.length === 0) {
                document.getElementById('quizContent').innerHTML = '<p class="text-danger">Quiz not found</p>';
                return;
            }

            timeLeft = quiz.duration * 60;
            document.getElementById('quizTitle').textContent = quiz.title;
            document.getElementById('quizCategory').textContent = quiz.category;
            document.getElementById('progressText').textContent = `0/${questions.length}`;

            startTimer();
            renderQuestion(questions[currentQuestion], currentQuestion, questions.length);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                }
                
                if (timeLeft < 60) {
                    document.getElementById('timer').classList.add('timer-warning');
                }
            }, 1000);
        }

        function renderQuestion(question, index, total) {
            document.getElementById('progressText').textContent = `${index + 1}/${total}`;
            document.getElementById('progressBar').style.width = `${((index + 1) / total) * 100}%`;
            
            let html = `
                <div class="question-card">
                    <h5 class="mb-4">${index + 1}. ${question.question}</h5>
                    <div class="d-grid gap-2">
            `;
            
            ['A', 'B', 'C', 'D'].forEach(opt => {
                const selected = answers[question.id] === opt ? 'selected' : '';
                html += `
                    <button class="btn btn-outline-secondary answer-option ${selected}" 
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <strong>${opt}.</strong> ${question['option' + opt]}
                    </button>
                `;
            });
            
            html += '</div></div>';
            document.getElementById('quizContent').innerHTML = html;
            
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').textContent = index === total - 1 ? 'Submit Quiz' : 'Next';
        }

        function selectAnswer(questionId, answer) {
            answers[questionId] = answer;
            renderQuestion(getQuestions().find(q => q.id === questionId), 
                          currentQuestion, getQuestionsByQuizId(quizId).length);
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion(getQuestionsByQuizId(quizId)[currentQuestion], 
                              currentQuestion, getQuestionsByQuizId(quizId).length);
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            const questions = getQuestionsByQuizId(quizId);
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion(questions[currentQuestion], 
                              currentQuestion, questions.length);
            } else {
                submitQuiz();
            }
        });

        function submitQuiz() {
            clearInterval(timerInterval);
            
            const user = getCurrentUser();
            const questions = getQuestionsByQuizId(quizId);
            const quiz = findQuizById(quizId);
            
            let score = 0;
            questions.forEach(q => {
                if (answers[q.id] === q.correctAnswer) score++;
            });
            
            const accuracy = Math.round((score / questions.length) * 100);
            const timeTaken = (quiz.duration * 60) - timeLeft;
            
            const attempt = {
                id: `attempt-${Date.now()}`,
                employeeId: user.id,
                quizId: quizId,
                startTime: new Date(Date.now() - timeTaken * 1000).toISOString(),
                endTime: new Date().toISOString(),
                score: score,
                totalQuestions: questions.length,
                accuracy: accuracy,
                timeTaken: timeTaken,
                attemptNumber: getAttemptCount(user.id, quizId) + 1,
                answers: Object.entries(answers).map(([qId, ans]) => ({
                    questionId: qId,
                    selectedAnswer: ans,
                    isCorrect: ans === questions.find(q => q.id === qId)?.correctAnswer
                }))
            };
            
            addAttempt(attempt);
            
            // ML Prediction
            const mlResult = predictPerformance({
                score,
                accuracy,
                timeTaken,
                attempts: attempt.attemptNumber,
                previousPerformance: getAttemptsByEmployee(user.id).reduce((sum, a) => sum + a.accuracy, 0) / Math.max(1, getAttemptsByEmployee(user.id).length - 1),
                totalQuestions: questions.length,
                duration: quiz.duration
            });
            
            addPrediction({
                id: `pred-${Date.now()}`,
                attemptId: attempt.id,
                employeeId: user.id,
                performanceCategory: mlResult.category,
                confidence: mlResult.confidence,
                features: { score, accuracy, timeTaken, attempts: attempt.attemptNumber, previousPerformance: 0 },
                createdAt: new Date().toISOString()
            });
            
            // Generate Feedback
            addFeedback({
                id: `fb-${Date.now()}`,
                attemptId: attempt.id,
                employeeId: user.id,
                content: generateFeedback({
                    name: user.name,
                    quiz: quiz.title,
                    score,
                    total: questions.length,
                    accuracy,
                    timeTaken,
                    category: mlResult.category,
                    prevPerf: 0
                }),
                createdAt: new Date().toISOString()
            });
            
            window.location.href = `result.html?attemptId=${attempt.id}`;
        }
    </script>
</body>
</html>
